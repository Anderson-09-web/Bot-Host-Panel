services:
  - type: web
    name: discord-bot-panel
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: >
      gunicorn app:app
      --bind 0.0.0.0:$PORT
      --workers 2
      --threads 2
      --worker-class gthread
      --timeout 120
      --keep-alive 5
      --log-level info
      --access-logfile -
      --error-logfile -
    healthCheckPath: /login
    envVars:
      - key: FLASK_ENV
        value: production
      - key: BOT_PREFIX
        value: "!"
      - key: ADMIN_USERNAME
        value: admin
      - key: BOT_TIMEZONE
        value: UTC
      # Secretos — añade el valor en Render Dashboard → Environment:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
