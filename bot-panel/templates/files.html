{% extends "base.html" %}
{% block title %}Archivos — Bot Panel{% endblock %}
{% block page_title %}Explorador de Archivos{% endblock %}

{% block content %}
<div class="files-layout">
    <!-- Toolbar -->
    <div class="files-toolbar">
        <div class="breadcrumbs" id="breadcrumbs">
            <span class="breadcrumb-item active" data-path="" onclick="navigate('')">
                <i class="fa-solid fa-house"></i> Inicio
            </span>
        </div>
        <div class="files-actions">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Buscar archivos..." oninput="searchFiles(this.value)">
            </div>
            <button class="btn btn-sm btn-ghost" onclick="showCreateFolderModal()">
                <i class="fa-solid fa-folder-plus"></i> Carpeta
            </button>
            <button class="btn btn-sm btn-ghost" onclick="showCreateFileModal()">
                <i class="fa-solid fa-file-circle-plus"></i> Archivo
            </button>
            <button class="btn btn-sm btn-primary" onclick="document.getElementById('uploadInput').click()">
                <i class="fa-solid fa-upload"></i> Subir
            </button>
            <input type="file" id="uploadInput" multiple style="display:none" onchange="uploadFiles(this)">
        </div>
    </div>

    <!-- File Grid -->
    <div class="files-grid" id="filesGrid">
        <div class="loading-spinner"><i class="fa-solid fa-spinner fa-spin"></i> Cargando...</div>
    </div>

    <!-- Search Results -->
    <div class="search-results hidden" id="searchResults"></div>
</div>

<!-- Context Menu -->
<div class="context-menu hidden" id="contextMenu">
    <button onclick="ctxOpen()"><i class="fa-solid fa-eye"></i> Abrir / Editar</button>
    <button onclick="ctxDownload()"><i class="fa-solid fa-download"></i> Descargar</button>
    <button onclick="ctxRename()"><i class="fa-solid fa-pen"></i> Renombrar</button>
    <button onclick="ctxCopy()"><i class="fa-solid fa-copy"></i> Copiar</button>
    <button onclick="ctxMove()"><i class="fa-solid fa-scissors"></i> Mover</button>
    <button onclick="ctxCompress()"><i class="fa-solid fa-file-zipper"></i> Comprimir</button>
    <div class="ctx-divider"></div>
    <button onclick="ctxDelete()" class="danger"><i class="fa-solid fa-trash"></i> Eliminar</button>
</div>

<!-- Editor Modal -->
<div class="modal-overlay" id="editorModal">
    <div class="modal modal-lg">
        <div class="modal-header">
            <h3><i class="fa-solid fa-code"></i> <span id="editorTitle">Editor</span></h3>
            <button class="modal-close" onclick="closeEditor()">×</button>
        </div>
        <textarea class="code-editor" id="codeEditor" spellcheck="false"></textarea>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeEditor()">Cancelar</button>
            <button class="btn btn-primary" onclick="saveFile()"><i class="fa-solid fa-floppy-disk"></i> Guardar</button>
        </div>
    </div>
</div>

<!-- Create Folder Modal -->
<div class="modal-overlay" id="folderModal">
    <div class="modal">
        <div class="modal-header">
            <h3><i class="fa-solid fa-folder-plus"></i> Nueva Carpeta</h3>
            <button class="modal-close" onclick="closeModal('folderModal')">×</button>
        </div>
        <div class="modal-body">
            <input type="text" class="form-input" id="folderName" placeholder="Nombre de la carpeta">
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal('folderModal')">Cancelar</button>
            <button class="btn btn-primary" onclick="createFolder()">Crear</button>
        </div>
    </div>
</div>

<!-- Create File Modal -->
<div class="modal-overlay" id="fileModal">
    <div class="modal">
        <div class="modal-header">
            <h3><i class="fa-solid fa-file-circle-plus"></i> Nuevo Archivo</h3>
            <button class="modal-close" onclick="closeModal('fileModal')">×</button>
        </div>
        <div class="modal-body">
            <input type="text" class="form-input" id="newFileName" placeholder="nombre_archivo.py">
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal('fileModal')">Cancelar</button>
            <button class="btn btn-primary" onclick="createFile()">Crear</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/files.js') }}"></script>
{% endblock %}
